worker_processes auto;
pid /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx.pid;
error_log /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-error.log;
daemon off;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  client_max_body_size 100M;

  access_log /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-access.log;
  client_body_temp_path /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-client;
  proxy_temp_path /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-proxy;
  fastcgi_temp_path /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-fastcgi;
  uwsgi_temp_path /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-uwsgi;
  scgi_temp_path /tmp/agent_7d465620-1da1-4f49-9841-00c5ff67365f/nginx-scgi;

  server {
    listen 5000;
    listen 80;
    server_name localhost;

    # Frontend (Next.js on 3001)
    location / {
      proxy_pass http://127.0.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    # Backend API (FastAPI on 8000)
    location /api/v1/ {
      proxy_pass http://127.0.0.1:8000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    # MCP server (FastMCP on 8001)
    location /mcp/ {
      proxy_pass http://127.0.0.1:8001/mcp/;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp {
      proxy_pass http://127.0.0.1:8001/mcp;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
      proxy_pass http://127.0.0.1:8000/docs;
    }

    location /openapi.json {
      proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    # Static assets served by backend
    location /static {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_7d465620-1da1-4f49-9841-00c5ff67365f/servers/fastapi/static/;
    }

    location /app_data/ {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_7d465620-1da1-4f49-9841-00c5ff67365f/app_data/;
    }
  }
}
