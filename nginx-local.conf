user root;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  client_max_body_size 100M;

  server {
    listen 80;
    server_name localhost;

    location / {
      proxy_pass http://localhost:3001;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /api/v1/ {
      proxy_pass http://localhost:8000;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /mcp/ {
      proxy_pass http://localhost:8001/mcp/;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp {
      proxy_pass http://localhost:8001/mcp;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
      proxy_pass http://localhost:8000/docs;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /openapi.json {
      proxy_pass http://localhost:8000/openapi.json;
      proxy_read_timeout 30m;
      proxy_connect_timeout 30m;
    }

    location /static {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_bf4c59d4-471c-4a73-9ce8-d5321b35d12c/servers/fastapi/static/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/images/ {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_bf4c59d4-471c-4a73-9ce8-d5321b35d12c/app_data/images/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/exports/ {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_bf4c59d4-471c-4a73-9ce8-d5321b35d12c/app_data/exports/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/uploads/ {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_bf4c59d4-471c-4a73-9ce8-d5321b35d12c/app_data/uploads/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location /app_data/fonts/ {
      alias /workspace/0c85e0dc-1244-40ab-8f84-e11668f857da/sessions/agent_bf4c59d4-471c-4a73-9ce8-d5321b35d12c/app_data/fonts/;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
